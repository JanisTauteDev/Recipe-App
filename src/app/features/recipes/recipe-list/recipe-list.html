<section class="section">
  <div class="container">
    <h2 class="title">Rezepte</h2>

    <div class="columns is-multiline">
      <div class="column is-one-quarter" *ngFor="let recipe of recipes"> <!--erzeugt pro DUmmyRezept eine card-->
        <a class="card" [routerLink]="['/recipes', recipe.id]"> <!--routerLink: baut /recipes/id -> kein href-->
          <div class="card-image">
            <figure class="image is-4by3">
              <img [src]="recipe.image" [alt]="recipe.name" />
            </figure>
          </div>

          <div class="card-content">
            <p class="title is-6">{{ recipe.name }}</p>
          </div>
        </a>
      </div>
    </div>
  </div>
</section>
