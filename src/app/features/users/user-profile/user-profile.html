<section class="section">
  <div class="container">
    <button class="button is-light mb-4" (click)="goBack()">← Back to Recipe</button>

    @if (user$ | async; as user) {
      <h2 class="title mt-4">Author Profile</h2>

      <div class="box">
        <article class="media">
          <figure class="media-left">
            <p class="image is-96x96">
              <img [src]="user.image" [alt]="user.firstName + ' ' + user.lastName" />
            </p>
          </figure>

          <div class="media-content">
            <p class="title is-5">{{ user.firstName }} {{ user.lastName }}</p>
            <p class="subtitle is-6">@{{ user.username }}</p>

            <p><strong>Email:</strong> {{ user.email }}</p>
            <p><strong>User ID:</strong> {{ user.id }}</p>
          </div>
        </article>
      </div>
    } @else {
      <div class="notification is-light mt-4">Loading Userprofile…</div>
    }
  </div>
</section>
